name: SE333 CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Checkstyle (Static Analysis)
        run: mvn validate checkstyle:checkstyle -Dcheckstyle.failOnViolation=false

      - name: Upload Checkstyle Report
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml

      - name: Install Playwright Browsers and System Dependencies
        run: |
          mvn exec:java -e \
            -D exec.mainClass=com.microsoft.playwright.CLI \
            -D exec.args="install --with-deps chromium" \
            -D exec.classpathScope=test

      - name: Run Unit and Integration Tests with JaCoCo
        run: mvn test -Dtest="AmazonUnitTest,AmazonIntegrationTest"

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml

      - name: Run Playwright UI Tests (headless on CI)
        env:
          CI: true
        run: mvn test -Dtest=BookstorePlaywrightTraditional -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload Playwright Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-videos
          path: videos/
